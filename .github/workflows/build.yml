name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-13
            platform: darwin
            arch: x64
            ffmpeg_arch: amd64
          - os: macos-14
            platform: darwin
            arch: arm64
            ffmpeg_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ffmpeg (Windows)
        if: matrix.platform == 'win32'
        shell: bash
        run: |
          curl -L -o ffmpeg-download.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          unzip -o ffmpeg-download.zip -d ffmpeg-temp
          mkdir -p resources/ffmpeg/${{ matrix.platform }}-${{ matrix.arch }}
          find ffmpeg-temp -name "ffmpeg.exe" -exec cp {} resources/ffmpeg/${{ matrix.platform }}-${{ matrix.arch }}/ \;
          find ffmpeg-temp -name "ffprobe.exe" -exec cp {} resources/ffmpeg/${{ matrix.platform }}-${{ matrix.arch }}/ \;

      - name: Download ffmpeg (macOS)
        if: matrix.platform == 'darwin'
        run: |
          mkdir -p resources/ffmpeg/${{ matrix.platform }}-${{ matrix.arch }}
          curl -L -o ffmpeg.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/${{ matrix.ffmpeg_arch }}/release/ffmpeg.zip"
          unzip -o ffmpeg.zip -d ffmpeg-temp
          cp ffmpeg-temp/ffmpeg resources/ffmpeg/${{ matrix.platform }}-${{ matrix.arch }}/ffmpeg
          curl -L -o ffprobe.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/${{ matrix.ffmpeg_arch }}/release/ffprobe.zip"
          unzip -o ffprobe.zip -d ffprobe-temp
          cp ffprobe-temp/ffprobe resources/ffmpeg/${{ matrix.platform }}-${{ matrix.arch }}/ffprobe
          chmod +x resources/ffmpeg/${{ matrix.platform }}-${{ matrix.arch }}/ffmpeg
          chmod +x resources/ffmpeg/${{ matrix.platform }}-${{ matrix.arch }}/ffprobe

      - name: Build Electron app
        run: npm run build

      - name: Package (Windows)
        if: matrix.platform == 'win32'
        run: npx electron-builder --win --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (macOS)
        if: matrix.platform == 'darwin'
        run: npx electron-builder --mac --${{ matrix.arch }} --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.dmg
            dist/*.zip
            dist/*.zip.blockmap
            dist/*.yml
            dist/*.yaml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
