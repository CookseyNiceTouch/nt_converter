name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version from tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup DigiCert code signing env vars
        shell: bash
        run: |
          echo "SM_HOST=${{ secrets.KEYLOCKER_HOST }}" >> $GITHUB_ENV
          echo "SM_API_KEY=${{ secrets.KEYLOCKER_WINDOWS_KEY }}" >> $GITHUB_ENV
          echo "SM_CLIENT_CERT_PASSWORD=${{ secrets.KEYLOCKER_CLIENTAUTHCERT_PW }}" >> $GITHUB_ENV
          echo "SM_CODE_SIGNING_CERT_SHA1_HASH=${{ secrets.KEYLOCKER_CERT_SHA1_HASH }}" >> $GITHUB_ENV

      - name: Setup DigiCert client certificate
        shell: bash
        run: |
          echo "${{ secrets.KEYLOCKER_CLIENT_CERT }}" | base64 --decode > /d/Certificate_pkcs12.p12
          echo "SM_CLIENT_CERT_FILE=D:\\Certificate_pkcs12.p12" >> $GITHUB_ENV

      - name: Install DigiCert client tools
        uses: digicert/ssm-code-signing@v1.1.1
        env:
          FORCE_DOWNLOAD_TOOLS: 'true'

      - name: Verify signing tools
        shell: powershell
        run: |
          smctl --version
          Write-Host "SM_HOST: $env:SM_HOST"
          Write-Host "SM_API_KEY: $(if($env:SM_API_KEY){'[SET]'}else{'[NOT SET]'})"
          Write-Host "SM_CLIENT_CERT_FILE: $env:SM_CLIENT_CERT_FILE"
          Write-Host "SM_CLIENT_CERT_PASSWORD: $(if($env:SM_CLIENT_CERT_PASSWORD){'[SET]'}else{'[NOT SET]'})"
          Write-Host "SM_CODE_SIGNING_CERT_SHA1_HASH: $env:SM_CODE_SIGNING_CERT_SHA1_HASH"

      - name: Register DigiCert KSP and sync certificate
        shell: powershell
        run: |
          smctl windows ksp register
          smctl windows certsync --keypair-alias key_1503925739

      - name: Download ffmpeg
        shell: bash
        run: |
          set -euo pipefail
          curl -fSL --retry 3 --retry-delay 5 -o ffmpeg-download.zip \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          unzip -o ffmpeg-download.zip -d ffmpeg-temp
          mkdir -p resources/ffmpeg/win32-x64
          find ffmpeg-temp -name "ffmpeg.exe" -exec cp {} resources/ffmpeg/win32-x64/ \;
          find ffmpeg-temp -name "ffprobe.exe" -exec cp {} resources/ffmpeg/win32-x64/ \;
          echo "Verifying binaries..."
          ls -la resources/ffmpeg/win32-x64/

      - name: Build Electron app
        run: npm run build

      - name: Package
        run: npx electron-builder --win --publish never --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.yml
            dist/*.yaml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Apple signing certificate
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/apple_signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          printf '%s' "$MACOS_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/\"//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}

      - name: Download ffmpeg (arm64)
        run: |
          set -euo pipefail
          mkdir -p resources/ffmpeg/darwin-arm64

          curl -fSL --retry 3 --retry-delay 5 -o ffmpeg-arm64.zip \
            "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip"
          unzip -o ffmpeg-arm64.zip -d ffmpeg-arm64-temp
          find ffmpeg-arm64-temp -name "ffmpeg" -type f -exec cp {} resources/ffmpeg/darwin-arm64/ffmpeg \;

          curl -fSL --retry 3 --retry-delay 5 -o ffprobe-arm64.zip \
            "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffprobe.zip"
          unzip -o ffprobe-arm64.zip -d ffprobe-arm64-temp
          find ffprobe-arm64-temp -name "ffprobe" -type f -exec cp {} resources/ffmpeg/darwin-arm64/ffprobe \;

          chmod +x resources/ffmpeg/darwin-arm64/*

      - name: Download ffmpeg (x64)
        run: |
          set -euo pipefail
          mkdir -p resources/ffmpeg/darwin-x64

          curl -fSL --retry 3 --retry-delay 5 -o ffmpeg-x64.zip \
            "https://ffmpeg.martin-riedl.de/redirect/latest/macos/amd64/release/ffmpeg.zip"
          unzip -o ffmpeg-x64.zip -d ffmpeg-x64-temp
          find ffmpeg-x64-temp -name "ffmpeg" -type f -exec cp {} resources/ffmpeg/darwin-x64/ffmpeg \;

          curl -fSL --retry 3 --retry-delay 5 -o ffprobe-x64.zip \
            "https://ffmpeg.martin-riedl.de/redirect/latest/macos/amd64/release/ffprobe.zip"
          unzip -o ffprobe-x64.zip -d ffprobe-x64-temp
          find ffprobe-x64-temp -name "ffprobe" -type f -exec cp {} resources/ffmpeg/darwin-x64/ffprobe \;

          chmod +x resources/ffmpeg/darwin-x64/*

      - name: Verify ffmpeg binaries
        run: |
          echo "=== arm64 ==="
          file resources/ffmpeg/darwin-arm64/ffmpeg
          file resources/ffmpeg/darwin-arm64/ffprobe
          echo "=== x64 ==="
          file resources/ffmpeg/darwin-x64/ffmpeg
          file resources/ffmpeg/darwin-x64/ffprobe

      - name: Build Electron app
        run: npm run build

      - name: Package
        run: npx electron-builder --mac --arm64 --x64 --publish never --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEYCHAIN: ${{ env.CSC_KEYCHAIN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.zip.blockmap
            dist/*.yml
            dist/*.yaml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
